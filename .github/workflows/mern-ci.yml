name: MERN CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jetset/package-lock.json
      - name: Build Frontend
        working-directory: jetset
        run: |
          npm ci
          CI=false npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: jetset/build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - name: Lint Backend
        working-directory: src
        run: |
          npm install --legacy-peer-deps
          npm run lint
      - uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            src/**
            !src/node_modules/**
            !src/.env

  deploy:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    steps:
      - name: Download Frontend
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: dist/frontend

      - name: Download Backend
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: dist/backend

      - name: Prepare directories on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          script: |
            sudo mkdir -p /var/www/JetSet/frontend
            sudo mkdir -p /var/www/JetSet/backend
            sudo chown -R $USER:$USER /var/www/JetSet

      - name: Deploy Frontend to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          source: "dist/frontend/*"
          target: "/var/www/JetSet/frontend"
          strip_components: 2 # removes dist/frontend/ prefix

      - name: Deploy Backend to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          source: "dist/backend/*"
          target: "/var/www/JetSet/backend"
          strip_components: 2

      - name: Write .env to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          script: |
            cat > /var/www/JetSet/backend/.env << 'EOF'
            MONGO_URI=${{ secrets.MONGO_URI }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            AMADEUS_API_KEY=${{ secrets.AMADEUS_API_KEY }}
            AMADEUS_API_SECRET=${{ secrets.AMADEUS_API_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            HOTELBEDS_API_KEY=${{ secrets.HOTELBEDS_API_KEY }}
            HOTELBEDS_SECRET=${{ secrets.HOTELBEDS_SECRET }}
            EOF

      - name: Restart Services
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          script: |
            pm2 restart backend || pm2 start /var/www/JetSet/backend/App.js --name backend
            sudo systemctl reload nginx
