name: MERN CI Pipeline

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jetset/package-lock.json

      - name: Build Frontend
        working-directory: jetset
        run: |
          npm ci
          CI=false npm run build
          mkdir -p ../dist/frontend
          cp -r build/* ../dist/frontend

      - name: Prepare Backend
        working-directory: src
        run: |
          npm ci
          npm run lint
          mkdir -p ../dist/backend
          cp -r . ../dist/backend
          rm -rf ../dist/backend/node_modules

      - name: Upload Combined Artifact
        uses: actions/upload-artifact@v4
        with:
          name: full-app
          path: dist

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download Artifact
        uses: actions/download-artifact@v4
        with:
          name: full-app
          path: dist

      - name: Deploy to VM via SSH
        uses: ppleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_KEY }}
          source: "dist/*"
          target: "/var/www/JetSet"

