name: MERN CI Pipeline
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: jetset/package-lock.json
      - name: Build Frontend
        working-directory: jetset
        env:
          REACT_APP_ENV: ${{ secrets.React_APP_ENV }}
        run: |
          npm ci
          CI=false npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: jetset/build

  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - name: Lint Backend
        working-directory: src
        run: |
          npm install --legacy-peer-deps
          npm run lint
      - uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: |
            src/**
            !src/node_modules/**
            !src/.env

  deploy-backend:
    runs-on: ubuntu-latest
    needs: [build-frontend, build-backend]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build
          path: ./backend-build

      - name: SCP backend to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "backend-build/"
          target: "/tmp/"

      - name: Start backend on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            mkdir -p /var/www/api
            rsync -a --delete /tmp/backend-build/ /var/www/api/
            cd /var/www/api
            npm install --production --legacy-peer-deps

            cat > /var/www/api/.env << 'ENVEOF'
            NODE_ENV=production
            PORT=3000
            MONGO_URI=${{ secrets.MONGO_URI }}
            AMADEUS_API_KEY=${{ secrets.AMADEUS_API_KEY }}
            AMADEUS_API_SECRET=${{ secrets.AMADEUS_API_SECRET }}
            HOTELBEDS_API_KEY=${{ secrets.HOTELBEDS_API_KEY }}
            HOTELBEDS_SECRET=${{ secrets.HOTELBEDS_SECRET }}
            EMAIL_USER=${{ secrets.EMAIL_USER }}
            EMAIL_PASS=${{ secrets.EMAIL_PASS }}
            STRIPE_SECRET_KEY=${{ secrets.STRIPE_SECRET_KEY }}
            ENVEOF

            pm2 restart api || pm2 start index.js --name api --cwd /var/www/api
            pm2 save

  deploy-frontend:
    runs-on: ubuntu-latest
    needs: [build-frontend, deploy-backend] # ← waits for backend to be live
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: frontend-build
          path: ./frontend-build

      - name: SCP frontend to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: "frontend-build/"
          target: "/tmp/"

      - name: Deploy frontend files
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo rm -rf /var/www/app/*
            sudo cp -r /tmp/frontend-build/. /var/www/app/
